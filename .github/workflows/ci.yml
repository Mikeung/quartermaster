name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests/ -q
      # Type-checking is advisory while strict-typing debt is paid down — it does
      # not gate CI yet. Run it for visibility without failing the build.
      - name: Typecheck (non-blocking)
        run: mypy backend/ scanners/ memory/ topology/ llm_intelligence/ observability/ || true
